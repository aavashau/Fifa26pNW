<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In · FIFA WC 2026 Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    * { box-sizing: border-box; }
    body {
      background: #070d1a;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e2e8f0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,230,118,.07) 0%, transparent 70%),
        repeating-linear-gradient(-45deg, transparent, transparent 60px, rgba(0,230,118,.012) 60px, rgba(0,230,118,.012) 61px);
      pointer-events: none;
    }
    .card {
      background: linear-gradient(135deg, #0d1929, #101e30);
      border: 1px solid #1a3055; border-radius: 16px;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #00e676, transparent);
    }
    .field {
      background: #060c18; border: 1px solid #1a3055; border-radius: 8px;
      color: #e2e8f0; padding: .625rem .875rem; width: 100%;
      transition: border-color .2s, box-shadow .2s; font-size: .9rem;
    }
    .field:focus { outline: none; border-color: #00e676; box-shadow: 0 0 0 3px rgba(0,230,118,.1); }
    .btn-green {
      background: linear-gradient(135deg, #00e676, #00c853); color: #000;
      font-weight: 800; border-radius: 8px; padding: .7rem; width: 100%;
      font-size: .95rem; transition: all .2s;
    }
    .btn-green:hover { opacity: .88; box-shadow: 0 4px 20px rgba(0,230,118,.3); }
    .btn-google {
      background: #fff; color: #111; font-weight: 700; border-radius: 8px;
      padding: .7rem; width: 100%; display: flex; align-items: center;
      justify-content: center; gap: .625rem; font-size: .95rem;
      transition: all .2s; text-decoration: none;
    }
    .btn-google:hover { background: #f1f5f9; box-shadow: 0 4px 16px rgba(0,0,0,.3); }
    .divider {
      display: flex; align-items: center; gap: .75rem;
      color: #334155; font-size: .72rem; margin: 1.1rem 0;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#1a3055; }
  </style>
</head>
<body>
  <div class="relative z-10 w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="https://m.media-amazon.com/images/M/MV5BNzk0NGIyMTctNmRkZi00ODQ0LWFhYjMtZDlmOTI3Y2JjMTRhXkEyXkFqcGc@.jpg"
           alt="FIFA World Cup 2026"
           class="w-24 h-24 object-contain mx-auto rounded-2xl mb-4"
           style="box-shadow:0 0 40px rgba(0,230,118,.2)"/>
      <h1 class="text-3xl font-black tracking-tight" style="color:#fbbf24;">FIFA World Cup 2026</h1>
      <p class="text-slate-400 text-sm mt-1">Score Predictor · Private Game</p>
    </div>

    <div class="card p-8">
      <h2 class="text-lg font-black mb-6 text-center uppercase tracking-widest" style="color:#00e676;">Sign In</h2>

      {% if error %}
      <div class="rounded-lg px-4 py-3 mb-5 text-sm font-medium"
           style="background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#f87171;">
        {{ error }}
      </div>
      {% endif %}

      {% if google_enabled %}
      <!-- Google Sign In -->
      <a href="/auth/google?intent=login" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.3 0 24 0 14.6 0 6.6 5.5 2.7 13.5l7.9 6.1C12.5 13.2 17.8 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 7.1-10 7.1-17z"/>
          <path fill="#FBBC05" d="M10.6 28.4A14.5 14.5 0 0 1 9.5 24c0-1.5.3-3 .7-4.4L2.3 13.5A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.6 10.5l8-6.1z"/>
          <path fill="#34A853" d="M24 48c6.2 0 11.5-2 15.3-5.5l-7.5-5.8c-2.1 1.4-4.7 2.3-7.8 2.3-6.2 0-11.5-4.2-13.4-9.8l-7.9 6.1C6.6 42.5 14.6 48 24 48z"/>
        </svg>
        Continue with Google
      </a>
      <div class="divider">or sign in with email</div>
      {% endif %}

      <!-- Email / password -->
      <form method="post" action="/login" class="space-y-3">
        <input type="email" name="email" required autocomplete="email"
               class="field" placeholder="Email address"/>
        <input type="password" name="password" required autocomplete="current-password"
               class="field" placeholder="Password"/>
        <button type="submit" class="btn-green mt-1">Sign In →</button>
      </form>

      <p class="text-center text-slate-500 text-xs mt-5">
        No account? You need an invite link from the admin.
      </p>
    </div>

    {% if show_setup %}
    <p class="text-slate-600 text-xs text-center mt-5">
      First time? <a href="/setup" style="color:#00e676;">Admin setup →</a>
    </p>
    {% endif %}

  </div>
</body>
</html>
