<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login · FWC 2026 Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; }
    .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: .75rem; }
    .field { background: #0f1117; border: 1px solid #2d3748; border-radius: .5rem;
             color: #fff; padding: .625rem .875rem; width: 100%; transition: border-color .15s; }
    .field:focus { outline: none; border-color: #00c853; }
    .btn-primary { background: #00c853; color: #000; font-weight: 700; border-radius: .5rem;
                   padding: .625rem; width: 100%; font-size: 1rem; transition: opacity .15s; }
    .btn-primary:hover { opacity: .85; }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center px-4">

  <div class="text-center mb-8">
    <img src="https://m.media-amazon.com/images/M/MV5BNzk0NGIyMTctNmRkZi00ODQ0LWFhYjMtZDlmOTI3Y2JjMTRhXkEyXkFqcGc@.jpg"
         alt="FIFA World Cup 2026" class="w-24 h-24 object-contain mx-auto rounded-xl shadow-lg"/>
    <h1 class="text-3xl font-bold mt-3">
      <span style="color:#FFD700">FIFA World Cup</span>
      <span style="color:#00c853"> 2026</span>
    </h1>
    <p class="text-gray-400 mt-1">Score Predictor · Private Game</p>
  </div>

  <div class="card w-full max-w-sm p-8">
    <h2 class="text-xl font-bold mb-6 text-center">Sign In</h2>

    {% if error %}
    <div class="bg-red-900/40 border border-red-700 text-red-300 rounded-lg px-4 py-3 mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="text-sm text-gray-400 block mb-1">Email</label>
        <input type="email" name="email" required autocomplete="email"
               class="field" placeholder="you@example.com"/>
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Password</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="field" placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <p class="text-center text-gray-500 text-sm mt-6">
      No account? You need an invite link from the admin.
    </p>
  </div>

  <p class="text-gray-600 text-xs mt-8">
    First time? <a href="/setup" class="text-green-600 hover:text-green-400">Admin setup →</a>
  </p>

</body>
</html>
