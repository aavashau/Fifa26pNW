<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In · FIFA WC 2026 Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    * { box-sizing: border-box; }
    body {
      background: #070d1a;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e2e8f0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,230,118,.07) 0%, transparent 70%),
        repeating-linear-gradient(-45deg, transparent, transparent 60px, rgba(0,230,118,.012) 60px, rgba(0,230,118,.012) 61px);
      pointer-events: none;
    }
    .card {
      background: linear-gradient(135deg, #0d1929, #101e30);
      border: 1px solid #1a3055; border-radius: 16px;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #00e676, transparent);
    }
    .field {
      background: #060c18; border: 1px solid #1a3055; border-radius: 8px;
      color: #e2e8f0; padding: .625rem .875rem; width: 100%;
      transition: border-color .2s, box-shadow .2s; font-size: .9rem;
    }
    .field:focus { outline: none; border-color: #00e676; box-shadow: 0 0 0 3px rgba(0,230,118,.1); }
    .btn-green {
      background: linear-gradient(135deg, #00e676, #00c853); color: #000;
      font-weight: 800; border-radius: 8px; padding: .7rem; width: 100%;
      font-size: .95rem; transition: all .2s;
    }
    .btn-green:hover { opacity: .88; box-shadow: 0 4px 20px rgba(0,230,118,.3); }
  </style>
</head>
<body>
  <div class="relative z-10 w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="https://m.media-amazon.com/images/M/MV5BNzk0NGIyMTctNmRkZi00ODQ0LWFhYjMtZDlmOTI3Y2JjMTRhXkEyXkFqcGc@.jpg"
           alt="FIFA World Cup 2026"
           class="w-24 h-24 object-contain mx-auto rounded-2xl mb-4"
           style="box-shadow:0 0 40px rgba(0,230,118,.2)"/>
      <h1 class="text-3xl font-black tracking-tight" style="color:#fbbf24;">FIFA World Cup 2026</h1>
      <p class="text-slate-400 text-sm mt-1">Score Predictor · Private Game</p>
    </div>

    <div class="card p-8">
      <h2 class="text-lg font-black mb-6 text-center uppercase tracking-widest" style="color:#00e676;">Sign In</h2>

      {% if error %}
      <div class="rounded-lg px-4 py-3 mb-5 text-sm font-medium"
           style="background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#f87171;">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-3">
        <input type="email" name="email" required autocomplete="email"
               class="field" placeholder="Email address"/>
        <input type="password" name="password" required autocomplete="current-password"
               class="field" placeholder="Password"/>
        <button type="submit" class="btn-green mt-1">Sign In →</button>
      </form>

      <p class="text-center text-slate-500 text-xs mt-5">
        No account? Contact the admin at
        <a href="mailto:fifaworldcuppredictor@gmail.com" style="color:#00e676;">fifaworldcuppredictor@gmail.com</a>
        for an invite link.
      </p>
    </div>

  </div>
</body>
</html>
