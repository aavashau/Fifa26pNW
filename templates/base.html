<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}FWC 2026 Predictor{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:  '#00c853',
            gold:     '#FFD700',
            dark:     '#0f1117',
            card:     '#1a1f2e',
            border:   '#2d3748',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f1117; }
    .nav-link { transition: color .15s; }
    .nav-link:hover { color: #00c853; }
    .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: .75rem; }
    .btn-primary { background: #00c853; color: #000; font-weight: 700; border-radius: .5rem;
                   padding: .5rem 1.25rem; transition: opacity .15s; display: inline-block; }
    .btn-primary:hover { opacity: .85; }
    .btn-gold { background: #FFD700; color: #000; font-weight: 700; border-radius: .5rem;
                padding: .5rem 1.25rem; transition: opacity .15s; display: inline-block; }
    .btn-gold:hover { opacity: .85; }
    .badge-open     { background:#00c853; color:#000; }
    .badge-closed   { background:#ef4444; color:#fff; }
    .badge-upcoming { background:#3b82f6; color:#fff; }
    .badge-completed{ background:#6b7280; color:#fff; }
    .badge { font-size:.7rem; font-weight:700; padding:.15rem .5rem;
             border-radius:9999px; text-transform:uppercase; letter-spacing:.04em; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    .score-input { width:3.5rem; text-align:center; background:#0f1117; border:1px solid #2d3748;
                   border-radius:.375rem; color:#fff; font-size:1.25rem; font-weight:700; padding:.375rem; }
    .score-input:focus { outline:none; border-color:#00c853; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:#1a1f2e; }
    ::-webkit-scrollbar-thumb { background:#2d3748; border-radius:3px; }
  </style>
</head>
<body class="text-white min-h-screen">

{% if user is defined and user %}
<!-- Navbar -->
<nav class="border-b border-border sticky top-0 z-50" style="background:#0f1117cc;backdrop-filter:blur(8px);">
  <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14">
    <a href="/dashboard" class="flex items-center gap-2 font-bold text-lg">
      <span class="text-2xl">⚽</span>
      <span class="text-gold">FWC</span><span class="text-primary">2026</span>
    </a>
    <div class="flex items-center gap-6 text-sm text-gray-400">
      <a href="/dashboard"  class="nav-link {% if active=='dashboard'  %}text-primary{% endif %}">Dashboard</a>
      <a href="/fixtures"   class="nav-link {% if active=='fixtures'   %}text-primary{% endif %}">Fixtures</a>
      <a href="/leaderboard"class="nav-link {% if active=='leaderboard'%}text-primary{% endif %}">Leaderboard</a>
      {% if user.is_admin %}
      <a href="/admin" class="nav-link {% if active=='admin' %}text-gold{% endif %} text-gold">Admin</a>
      {% endif %}
      <span class="text-gray-600">|</span>
      <span class="text-white font-medium">{{ user.username }}</span>
      <a href="/logout" class="nav-link text-red-400">Logout</a>
    </div>
  </div>
</nav>
{% endif %}

<main class="max-w-6xl mx-auto px-4 py-6">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-gray-600 text-xs py-6 border-t border-border mt-12">
  FWC 2026 Score Predictor · Private Game · All times in Nepal Standard Time (NPT)
</footer>

</body>
</html>
